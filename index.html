<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Установка CWGame Бамбук</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <main class="glass-panel container">
      <h1 class="title">
        <img
          src="https://raw.githubusercontent.com/Ibirtem/CatWarGame-Bamboo/main/images/icons/bamboo.png"
          alt="Bamboo Logo"
          class="title-icon"
        />
        CWGame Бамбук
      </h1>
      <p class="description">Установка мода</p>

      <div class="button-group">
        <a
          href="https://github.com/Ibirtem/CatWarGame-Bamboo/raw/main/CWG-Bamboo.user.js"
          class="glass-panel glass-interactive btn"
        >
          Установить
        </a>

        <button
          id="download-btn"
          class="glass-panel glass-interactive btn"
          data-url="https://raw.githubusercontent.com/Ibirtem/CatWarGame-Bamboo/main/CWG-Bamboo.user.js"
        >
          Скачать мод файлом
        </button>

        <a
          href="https://github.com/Ibirtem/CatWarGame-Bamboo/blob/main/CWG-Bamboo.user.js"
          target="_blank"
          rel="noopener noreferrer"
          class="glass-panel glass-interactive btn"
        >
          Открыть исходники
        </a>
      </div>
    </main>
  </body>
</html>
